name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install required Android SDK platform
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/planify-v0.1.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "Planify v0.1.${{ github.run_number }}"
          body: |
            Build automático desde `main` — commit ${{ github.sha }}

            **Instalar en Android:**
            1. Descarga el `.apk`
            2. Activa *Instalar apps de origen desconocido* en ajustes
            3. Abre el archivo descargado
          files: app/build/outputs/apk/debug/planify-v0.1.${{ github.run_number }}.apk
          generate_release_notes: true
